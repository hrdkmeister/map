<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대한민국명장 사업장 지도 - 사업장 정보 확인</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;background:#eef3f8;color:#172033}
header{padding:22px 20px;background:linear-gradient(135deg,#0437ab,#002d70);color:white}
header h1{margin:0 0 6px;font-size:20px}
header p{margin:0;color:#dce8f5;font-size:13px;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:18px 16px 90px}
.panel,.biz-card{background:white;border-radius:16px;padding:18px;box-shadow:0 6px 18px rgba(20,35,60,.08);margin-bottom:14px}
.greeting h2{margin:0 0 7px;font-size:18px}
.greeting p{margin:4px 0;font-size:13px;line-height:1.6;color:#445}
.biz-card{border:1px solid #e1e8f0}
.biz-card.answered{border-left:5px solid #0f9d6a}
.biz-card.invalid{border:2px solid #d92d20;background:#fff7f6}
.validation-message{display:none;margin:10px 0 0;color:#d92d20;font-size:13px;font-weight:800;line-height:1.45}
.biz-card.invalid .validation-message{display:block}
.biz-title{font-weight:800;font-size:16px;margin-bottom:5px}
.biz-sub{font-size:12px;color:#667085;margin-bottom:5px}
.biz-address{font-size:13px;color:#26364f;margin-bottom:7px}
.biz-link{display:inline-block;font-size:12px;color:#0437ab;text-decoration:none;font-weight:700;margin-bottom:12px}
.question-title{font-size:13px;font-weight:800;margin:12px 0 8px}
.option-list{display:grid;gap:8px}
.option-item{display:flex;align-items:flex-start;gap:9px;padding:11px 12px;border-radius:11px;border:1px solid #e1e8f0;background:#f7f9fc;cursor:pointer;font-size:13px;line-height:1.45}
.option-item input{margin-top:3px}
.option-item.checked{border-color:#0437ab;background:#eaf1fd}
.option-item strong{display:block}
.option-item .desc{display:block;color:#667085;font-size:12px;font-weight:400}
.extra-field{display:none;margin-top:9px}
.extra-field.visible{display:block}
input[type=text],textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #cdd6e2;font-size:14px;font-family:inherit}
.representative-box,.consent-box{display:block;margin-top:12px;padding:11px 12px;border:1px solid #e1e8f0;border-radius:11px;background:#fbfcfe;font-size:13px;line-height:1.5}
.note-field{margin-top:10px}
.note-field summary{font-size:12px;color:#245b92;cursor:pointer}
.note-field textarea{min-height:65px;margin-top:8px;resize:vertical}
.submit-bar{position:sticky;bottom:0;background:white;border-top:1px solid #e1e8f0;padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.progress-text{font-size:12px;color:#667085;margin-right:auto}
button{border:none;cursor:pointer;font-weight:800;border-radius:10px;padding:10px 16px;font-size:13px}
.btn-primary{background:#0437ab;color:white}
.btn-secondary{background:#e8eef5;color:#20304a}
button:disabled{opacity:.55;cursor:not-allowed}
.state{text-align:center;color:#667085;padding:45px 18px;font-size:14px;line-height:1.7}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(10px);background:#172033;color:white;padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:.2s;z-index:999}
.toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <h1>대한민국명장 사업장 지도 - 사업장 정보 확인</h1>
  <p>명장지도 시범서비스에 표시할 사업장과 명장님의 관계를 확인합니다.<br>기존 응답이 있으면 자동으로 불러오며, 다시 저장하면 최신 내용으로 변경됩니다.</p>
</header>

<div class="wrap">
  <div id="content"><div class="panel state">정보를 불러오는 중입니다.</div></div>
  <div class="submit-bar" id="submitBar" style="display:none">
    <span class="progress-text" id="progressText"></span>
    <button class="btn-secondary" id="copyBtn" type="button">결과 복사</button>
    <button class="btn-primary" id="submitBtn" type="button">저장하기</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const RELATION_OPTIONS = [
  {value:"direct",label:"직접 소유·운영 사업장",desc:"본인이 직접 소유하거나 대표·운영자로서 실질적으로 운영하거나 소속되어 근무하는 사업장."},
  {value:"brand",label:"기술 적용 사업장",desc:"대한민국명장 본인이 대표 또는 운영 주체인 브랜드의 공식 가맹점으로, 대한민국명장의 기술·레시피·품질관리 기준을 적용합니다. 예시: 체인점, 가맹점"},
  {value:"advice",label:"기술전수·자문·레시피 사용 사업장",desc:"기술전수,자문,고문,교육 또는 레시피 제공 관계가 있으나 직접 운영하는 사업장은 아닙니다."},
  {value:"other",label:"기타",desc:"위 항목으로 설명하기 어렵습니다. 아래 입력란에 관계를 직접 작성해주세요."},
  {value:"remove",label:"등재 대상 아님",desc:"현재 대한민국명장 사업장 지도에 표시하면 안 되는 사업장입니다."}
];

const cfg=window.APP_CONFIG||{};
const client=window.supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);
const token=new URLSearchParams(location.search).get("token")||"";
let personName="";
let rows=[];
const answers={};

function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
function jobEmoji(job){if(job.includes("제과")||job.includes("제빵"))return"🍰";if(job.includes("요리"))return"👨‍🍳";if(job.includes("자동차"))return"🚗";return"🏆"}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("visible");setTimeout(()=>t.classList.remove("visible"),2400)}

async function loadSurvey(){
  if(!token){
    document.getElementById("content").innerHTML='<div class="panel state">접근 정보가 없는 주소입니다.<br>담당자가 전달한 개인별 링크로 접속해주세요.</div>';
    return;
  }
  try{
    const {data,error}=await client.rpc("get_master_survey",{p_token:token});
    if(error)throw error;
    personName=data.name;
    rows=data.businesses||[];
    render();
  }catch(e){
    console.error(e);
    document.getElementById("content").innerHTML='<div class="panel state">유효하지 않거나 만료된 링크입니다.<br>담당자에게 개인별 링크를 다시 요청해주세요.</div>';
  }
}

function render(){
  const content=document.getElementById("content");
  content.innerHTML=`<div class="panel greeting"><h2>${esc(personName)} 명장님, 안녕하세요.</h2>
  <p>아래 ${rows.length}개 사업장별 관계를 확인해주세요. 저장 후 같은 링크로 다시 접속하면 수정할 수 있습니다.</p></div>`;

  rows.forEach(row=>{
    answers[row.idx]={
      relationType:row.relationType||"",
      relationLabel:row.relationLabel||"",
      otherText:row.otherText||"",
      representative:!!row.representative,
      consent:!!row.consent,
      note:row.note||""
    };
    const a=answers[row.idx];
    const card=document.createElement("div");
    card.className="biz-card"+(a.relationType?" answered":"");
    const options=RELATION_OPTIONS.map(opt=>`<label class="option-item ${a.relationType===opt.value?"checked":""}" data-value="${opt.value}">
      <input type="radio" name="relation-${row.idx}" value="${opt.value}" ${a.relationType===opt.value?"checked":""}>
      <span><strong>${opt.label}</strong><span class="desc">${opt.desc}</span></span></label>`).join("");

    card.innerHTML=`<div class="biz-title">${jobEmoji(row.job)} ${esc(row.business)}</div>
      <div class="biz-sub">${esc(row.job)} · 대표품목: ${esc(row.menu||"-")}</div>
      <div class="biz-address">📍 ${esc(row.address)}</div>
      ${row.naver?`<a class="biz-link" href="${esc(row.naver)}" target="_blank" rel="noopener">네이버플레이스에서 확인 ↗</a>`:""}
      <div class="question-title">이 사업장과 명장님의 관계는 무엇입니까?</div>
      <div class="option-list">${options}</div>
      <div class="validation-message" data-validation-message></div>
      <div class="extra-field ${a.relationType==="other"?"visible":""}" data-other-wrap>
        <input type="text" data-other placeholder="기타 관계를 직접 작성해주세요" value="${esc(a.otherText)}">
      </div>
      <label class="representative-box"><input type="checkbox" data-representative ${a.representative?"checked":""}> 이 사업장을 여러 지점중에 대표 사업장으로 소개합니다.</label>
      <label class="consent-box"><input type="checkbox" data-consent ${a.consent?"checked":""}> 위 정보를 대한민국명장 사업장 지도 시범서비스에 공개하는 데 동의합니다.</label>
      <details class="note-field"><summary>주소·대표품목·링크 수정 또는 추가 의견</summary>
      <textarea data-note placeholder="예: 주소 변경, 폐업, 지점명 변경 등">${esc(a.note)}</textarea></details>`;

    card.querySelectorAll(`input[name="relation-${row.idx}"]`).forEach(input=>{
      input.addEventListener("change",()=>{
        const opt=RELATION_OPTIONS.find(o=>o.value===input.value);
        a.relationType=input.value;a.relationLabel=opt?.label||"";
        card.querySelectorAll(".option-item").forEach(i=>i.classList.toggle("checked",i.dataset.value===input.value));
        card.querySelector("[data-other-wrap]").classList.toggle("visible",input.value==="other");
        card.classList.add("answered");
        clearCardValidation(card);
        updateProgress();
      });
    });
    card.querySelector("[data-other]").addEventListener("input",e=>{
      a.otherText=e.target.value;
      if(a.relationType==="other" && a.otherText.trim()){
        clearCardValidation(card);
      }
    });
    card.querySelector("[data-representative]").addEventListener("change",e=>{
      a.representative=e.target.checked;
    });
    card.querySelector("[data-consent]").addEventListener("change",e=>a.consent=e.target.checked);
    card.querySelector("[data-note]").addEventListener("input",e=>a.note=e.target.value);
    content.appendChild(card);
  });
  document.getElementById("submitBar").style.display="flex";
  updateProgress();
}

function updateProgress(){
  const all=Object.values(answers);
  document.getElementById("progressText").textContent=`${all.filter(a=>a.relationType).length} / ${all.length} 항목 선택됨`;
}

function clearAllValidation(){
  document.querySelectorAll(".biz-card").forEach(card=>clearCardValidation(card));
}

function clearCardValidation(card){
  card.classList.remove("invalid");
  const message=card.querySelector("[data-validation-message]");
  if(message)message.textContent="";
}

function showCardValidation(card,message){
  card.classList.add("invalid");
  const messageBox=card.querySelector("[data-validation-message]");
  if(messageBox)messageBox.textContent="⚠ "+message;
  card.scrollIntoView({behavior:"smooth",block:"center"});
}

function validateBeforeSave(){
  clearAllValidation();

  for(const row of rows){
    const a=answers[row.idx];
    const card=[...document.querySelectorAll(".biz-card")].find(c=>{
      const radio=c.querySelector(`input[name="relation-${row.idx}"]`);
      return !!radio;
    });

    if(!a.relationType){
      showCardValidation(card,"사업장 관계를 선택해주세요.");
      toast("선택하지 않은 사업장이 있습니다.");
      return false;
    }

    if(a.relationType==="other" && !a.otherText.trim()){
      showCardValidation(card,"기타 관계 내용을 작성해주세요.");
      const input=card.querySelector("[data-other]");
      card.querySelector("[data-other-wrap]").classList.add("visible");
      setTimeout(()=>input?.focus(),450);
      toast("기타 관계 내용을 작성해주세요.");
      return false;
    }
  }

  const representatives=rows.filter(row=>answers[row.idx].representative);

  if(representatives.length>1){
    alert(
      `대표 사업장은 1곳만 선택할 수 있습니다.\n\n현재 ${representatives.length}곳이 선택되어 있습니다.`
    );

    const firstRow=representatives[0];
    const firstCard=[...document.querySelectorAll(".biz-card")].find(c=>
      !!c.querySelector(`input[name="relation-${firstRow.idx}"]`)
    );

    showCardValidation(firstCard,"대표 사업장은 1곳만 선택할 수 있습니다. 다른 대표 사업장 체크를 해제해주세요.");
    return false;
  }

  return true;
}

function payload(){
  return rows.map(row=>({idx:row.idx,...answers[row.idx]}));
}

function resultText(){
  const lines=["[대한민국명장 사업장 지도] 사업장 관계 확인 결과",`성함: ${personName}`,""];
  rows.forEach(row=>{
    const a=answers[row.idx];
    lines.push(`- 사업장: ${row.business}`);
    lines.push(`  관계: ${a.relationLabel||"(미선택)"}`);
    if(a.otherText)lines.push(`  기타: ${a.otherText}`);
    lines.push(`  대표 사업장: ${a.representative?"예":"아니오"}`);
    lines.push(`  공개 동의: ${a.consent?"동의":"미동의"}`);
    if(a.note)lines.push(`  메모: ${a.note}`);
    lines.push("");
  });
  return lines.join("\n");
}

document.getElementById("copyBtn").onclick=async()=>{
  try{await navigator.clipboard.writeText(resultText());toast("결과가 복사되었습니다.")}
  catch(e){toast("복사에 실패했습니다.")}
};

document.getElementById("submitBtn").onclick=async()=>{
  if(!validateBeforeSave())return;

  const btn=document.getElementById("submitBtn");btn.disabled=true;btn.textContent="저장 중...";
  try{
    const {error}=await client.rpc("save_master_survey",{p_token:token,p_answers:payload()});
    if(error)throw error;
    toast("저장되었습니다. 같은 링크에서 다시 수정할 수 있습니다.");
  }catch(e){console.error(e);toast("저장 중 오류가 발생했습니다.")}
  finally{btn.disabled=false;btn.textContent="저장하기"}
};

loadSurvey();
</script>
</body>
</html>
