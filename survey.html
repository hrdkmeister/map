  }

const answers = {};

function getParam(key) {
  const params = new URLSearchParams(window.location.search);
  return params.get(key) || "";
}

function jobEmoji(job) {
  if (job.includes("제과") || job.includes("제빵")) return "🍰";
  if (job.includes("요리")) return "👨‍🍳";
  if (job.includes("자동차")) return "🚗";
  return "🏆";
}

function buildNamePicker() {
  const select = document.getElementById("nameSelect");
  const names = [...new Set(DATA.map(row => row.name))].sort((a, b) => a.localeCompare(b, "ko"));

  names.forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
  });

  select.addEventListener("change", () => {
    renderForName(select.value);
  });
}

function updateProgress() {
  const total = Object.keys(answers).length;
  const done = Object.values(answers).filter(a => a.workType).length;
  const progressText = document.getElementById("progressText");
  const submitBar = document.getElementById("submitBar");

  if (total === 0) {
    submitBar.style.display = "none";
    return;
  }

  submitBar.style.display = "flex";
  progressText.textContent = `${done} / ${total} 항목 체크됨`;
}

function renderForName(name) {
  const content = document.getElementById("content");
  content.innerHTML = "";

  for (const key in answers) {
    delete answers[key];
  }

  if (!name) {
    updateProgress();
    return;
  }

  const rows = DATA.filter(row => row.name === name);

  if (rows.length === 0) {
    content.innerHTML = `<div class="empty-state">해당 성함으로 등록된 사업장을 찾을 수 없습니다.</div>`;
    updateProgress();
    return;
  }

  const greeting = document.createElement("div");
  greeting.className = "greeting";
  greeting.innerHTML = `
    <h2>${name} 명장님, 안녕하세요.</h2>
    <p>아래 ${rows.length}개 사업장이 확인됩니다. 각 사업장마다 해당하는 근무 형태를 하나씩 선택해주세요.</p>
  `;
  content.appendChild(greeting);

  rows.forEach(row => {
    answers[row.idx] = { workType: "", note: "" };

    const card = document.createElement("div");
    card.className = "biz-card";
    card.dataset.idx = row.idx;

    const optionsHtml = WORK_TYPE_OPTIONS.map(opt => `
      <label class="option-item" data-value="${opt.value}">
        <input type="radio" name="work-${row.idx}" value="${opt.value}">
        <span>
          <strong>${opt.label}</strong>
          <span class="desc">${opt.desc}</span>
        </span>
      </label>
    `).join("");

    card.innerHTML = `
      <div class="biz-title">${jobEmoji(row.job)} ${row.business}</div>
      <div class="biz-sub">${row.job} · 대표품목: ${row.menu || "-"}</div>
      <div class="biz-address">📍 ${row.address}</div>
      <a class="biz-link" href="${row.naver}" target="_blank" rel="noopener">네이버플레이스에서 확인 ↗</a>
      <div class="option-list">${optionsHtml}</div>
      <details class="note-field">
        <summary>주소/대표품목/링크가 틀렸거나 남기고 싶은 말이 있으면 눌러주세요</summary>
        <textarea placeholder="예: 주소가 변경되었습니다. 새 주소는 ..." data-idx="${row.idx}"></textarea>
      </details>
    `;

    card.querySelectorAll(`input[name="work-${row.idx}"]`).forEach(input => {
      input.addEventListener("change", () => {
        answers[row.idx].workType = input.value;

        card.querySelectorAll(".option-item").forEach(item => {
          item.classList.toggle("checked", item.dataset.value === input.value);
        });

        card.classList.add("answered");
        updateProgress();
      });
    });

    const textarea = card.querySelector("textarea");
    textarea.addEventListener("input", () => {
      answers[row.idx].note = textarea.value;
    });

    content.appendChild(card);
  });

  updateProgress();
}

function buildResultText() {
  const name = document.getElementById("nameSelect").value;
  const lines = [];

  lines.push(`[대한민국 명장지도] 사업장 정보 확인 결과`);
  lines.push(`성함: ${name}`);
  lines.push("");

  DATA.filter(row => row.name === name).forEach(row => {
    const answer = answers[row.idx] || {};
    const optionLabel = WORK_TYPE_OPTIONS.find(opt => opt.value === answer.workType);

    lines.push(`- 사업장: ${row.business}`);
    lines.push(`  근무형태: ${optionLabel ? optionLabel.label : "(미선택)"}`);

    if (answer.note) {
      lines.push(`  메모: ${answer.note}`);
    }

    lines.push("");
  });

  return lines.join("\n");
}

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("visible");
  setTimeout(() => toast.classList.remove("visible"), 2200);
}

document.getElementById("copyBtn").addEventListener("click", async () => {
  const text = buildResultText();

  try {
    await navigator.clipboard.writeText(text);
    showToast("결과가 복사되었습니다. 카카오톡 등으로 붙여넣어 전달해주세요.");
  } catch (e) {
    showToast("복사에 실패했습니다. 화면을 캡처해서 전달해주세요.");
  }
});

document.getElementById("emailBtn").addEventListener("click", () => {
  const name = document.getElementById("nameSelect").value;
  const subject = encodeURIComponent(`[명장지도] ${name} 사업장 정보 확인 결과`);
  const body = encodeURIComponent(buildResultText());
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
});

buildNamePicker();

const presetName = getParam("name");

if (presetName) {
  const select = document.getElementById("nameSelect");
  select.value = presetName;

  if (select.value === presetName) {
    document.getElementById("namePicker").style.display = "none";
    renderForName(presetName);
  }
}
</script>
